version: 1

services:
  web:
    build: .
    port: 3000
    expose: true
    env:
      # Core app
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_NAME: "Althea (preview PR#${PR})"
      NEXT_PUBLIC_APP_URL: ${PREVIEW_URL}

      # Database (Prisma + Postgres, isolée par PR)
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@db:5432/althea?schema=public

      # Redis (isolé par PR)
      REDIS_URL: redis://redis:6379

      # NextAuth — URL dynamique = URL de la preview
      NEXTAUTH_URL: ${PREVIEW_URL}
      NEXTAUTH_SECRET: ${DB_PASSWORD}

      # OAuth providers — valeurs dummy (OAuth ne fonctionnera pas en preview
      # car les callbacks Google/GitHub ne matchent pas l'URL preview, mais
      # l'app doit booter sans crasher).
      GOOGLE_CLIENT_ID: preview-dummy
      GOOGLE_CLIENT_SECRET: preview-dummy
      GITHUB_CLIENT_ID: preview-dummy
      GITHUB_CLIENT_SECRET: preview-dummy

      # Stripe — clés test publiques (remplace par les vraies si besoin de tester le checkout)
      STRIPE_SECRET_KEY: sk_test_preview_dummy
      STRIPE_WEBHOOK_SECRET: whsec_preview_dummy
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_preview_dummy

      # Email — désactivé en preview (sinon spam depuis n'importe quelle PR)
      EMAILS_ENABLED: "false"
      RESEND_API_KEY: re_preview_dummy
      RESEND_FROM_EMAIL: preview@example.com

      # IA — optionnel, l'endpoint retourne 503 si absent
      # OPENAI_API_KEY: à remplir si tu veux tester le chatbot

      # Logging
      LOG_LEVEL: info
      LOG_DIR: /tmp/logs

    depends_on: [db, redis]

  db:
    image: postgres:16-alpine
    env:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: althea
    healthcheck:
      cmd: pg_isready -U app -d althea
      interval_seconds: 3
      retries: 30

  redis:
    image: redis:7-alpine
    healthcheck:
      cmd: redis-cli ping
      interval_seconds: 3
      retries: 20
