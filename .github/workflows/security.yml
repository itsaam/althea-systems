name: Security Audit

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Exécution hebdomadaire le lundi à 9h
    - cron: "0 9 * * 1"

jobs:
  dependency-audit:
    name: 🔒 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (summary)
        run: npm audit --omit=dev || echo "⚠️ Vulnérabilités détectées - voir le rapport ci-dessus"
        continue-on-error: true
